services: 
  nginx:
    image: nginx:alpine
    container_name: cascata-nginx
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CASCATA_DATA_DIR:-/cascata-data}/acme_challenge:/var/www/html
      - ${CASCATA_DATA_DIR:-/cascata-data}/certs:/etc/letsencrypt
      - ${CASCATA_DATA_DIR:-/cascata-data}/nginx_dynamic:/etc/nginx/conf.d/dynamic
      - cascata_sockets:/tmp/cascata_sockets
    depends_on:
      - backend_control
      - backend_data
      - frontend
    networks:
      - cascata_public
      - cascata_app
    restart: always

  nginx_controller:
    build:
      context: ./nginx-controller
      dockerfile: Dockerfile
    container_name: cascata-nginx-controller
    environment:
      - NGINX_CONTAINER_NAME=cascata-nginx
      - INTERNAL_CTRL_SECRET=${INTERNAL_CTRL_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cascata_app
    restart: always

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: cascata-pgbouncer
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-cascata_admin}
      - DB_PASSWORD=${DB_PASS:-secure_pass}
      - LISTEN_PORT=6432
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=10000
      - DEFAULT_POOL_SIZE=20
      - ADMIN_USERS=${DB_USER:-cascata_admin}
      - AUTH_TYPE=scram-sha-256
      - AUTH_QUERY=SELECT usename, passwd FROM pg_shadow WHERE usename=$1
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,binary_as_text
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cascata_data
    restart: always

  # --- BACKEND SERVICES ---

  backend_control:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascata-backend
    env_file: .env
    environment:
      - SERVICE_MODE=CONTROL_PLANE
      - SYSTEM_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - CASCATA_OTP_SECRET=${CASCATA_OTP_SECRET}
      - INTERNAL_CTRL_SECRET=${INTERNAL_CTRL_SECRET}
      - VAULT_ADDR=http://vault:8200
      - PORT=3000
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DB_DIRECT_HOST=db
      - DB_DIRECT_PORT=5432
      - DB_POOL_HOST=pgbouncer
      - DB_POOL_PORT=6432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - STORAGE_ROOT=/cascata/storage
      - MIGRATIONS_ROOT=/app/migrations
      - TEMP_UPLOAD_ROOT=/cascata/temp
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - API_KEY=${GEMINI_API_KEY}
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/acme_challenge:/var/www/html
      - ${CASCATA_DATA_DIR:-/cascata-data}/certs:/etc/letsencrypt
      - ${CASCATA_DATA_DIR:-/cascata-data}/storage:/cascata/storage
      - temp_data:/cascata/temp
      - ${CASCATA_DATA_DIR:-/cascata-data}/nginx_dynamic:/etc/nginx/conf.d/dynamic
      - /var/run/docker.sock:/var/run/docker.sock
      - extension_payloads:/cascata_extensions:ro
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      nginx_controller:
        condition: service_started
      vault:
        condition: service_started
    networks:
      - cascata_app
      - cascata_data
      - cascata_secure
    restart: always

  backend_data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascata-backend-data
    env_file: .env
    environment:
      - SERVICE_MODE=DATA_PLANE
      - SYSTEM_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - CASCATA_OTP_SECRET=${CASCATA_OTP_SECRET}
      - PORT=3000
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DB_DIRECT_HOST=db
      - DB_DIRECT_PORT=5432
      - DB_POOL_HOST=pgbouncer
      - DB_POOL_PORT=6432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - STORAGE_ROOT=/cascata/storage
      - MIGRATIONS_ROOT=/app/migrations
      - TEMP_UPLOAD_ROOT=/cascata/temp
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - API_KEY=${GEMINI_API_KEY}
      - ENGINE_URL=http://backend_engine:3000
      - VAULT_ADDR=http://vault:8200
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/storage:/cascata/storage
      - temp_data:/cascata/temp
      - cascata_sockets:/tmp/cascata_sockets
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      backend_engine:
        condition: service_started
      vault:
        condition: service_started
    networks:
      - cascata_app
      - cascata_data
      - cascata_secure
    restart: always

  # NOVO: Isolamento de Runtime (O "Airbag")
  backend_engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascata-backend-engine
    env_file: .env
    environment:
      - SERVICE_MODE=ROUTING_ENGINE
      - SYSTEM_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - CASCATA_OTP_SECRET=${CASCATA_OTP_SECRET}
      - PORT=3000
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DB_DIRECT_HOST=db
      - DB_DIRECT_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    # Sem volumes de storage (Engine é stateless para arquivos)
    # Limite rígido de memória para conter scripts maliciosos
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - cascata_app # Precisa receber requisições do Data Plane
      - cascata_data # Precisa acessar o Banco para executar queries
      - cascata_secure
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cascata-frontend
    networks:
      - cascata_public
    restart: always

  db:
    build:
      context: ./database
    container_name: cascata-db
    restart: always
    # CMD definido no Dockerfile inclui shared_preload_libraries e listen_addresses
    ports:
      - "5432:5432"
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${DB_USER:-cascata_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-secure_pass}
      POSTGRES_DB: ${DB_NAME:-cascata_system}
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/pg:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - extension_payloads:/cascata_extensions
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-cascata_admin} -d ${DB_NAME:-cascata_system}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cascata_data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cascata-qdrant
    restart: always
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/qdrant:/qdrant/storage
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "sleep 3; exit 0" ]
      interval: 5s
      timeout: 5s
      retries: 1
      start_period: 2s
    networks:
      - cascata_data

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: cascata-dragonfly
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/dragonfly:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cascata_data

  vault:
    image: hashicorp/vault:1.15
    container_name: cascata-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - VAULT_LOCAL_CONFIG='{"storage": {"file": {"path": "/vault/file"}}, "listener": {"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}, "default_lease_ttl": "168h", "max_lease_ttl": "8760h", "ui": true}'
    volumes:
      - ${CASCATA_DATA_DIR:-/cascata-data}/vault/logs:/vault/logs
      - ${CASCATA_DATA_DIR:-/cascata-data}/vault/file:/vault/file
    ports:
      - "8200:8200"
    command: server
    networks:
      - cascata_secure
    restart: always

networks:
  cascata_public:
    driver: bridge
  cascata_app:
    driver: bridge
  cascata_data:
    driver: bridge
    internal: true
  cascata_secure:
    driver: bridge
    internal: true

volumes:
  temp_data:
  cascata_sockets:
  extension_payloads:
    name: cascata_extension_payloads
