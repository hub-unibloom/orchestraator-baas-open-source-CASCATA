services:
  # Gateway Central (Porta 80 - AWS Firewall Link)
  cascata-gateway:
    image: nginx:1.25-alpine
    container_name: cascata-gateway
    ports:
      - "80:80"
    volumes:
      - ./deployments/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cascata-orchestrator
    networks:
      - cascata-net

  # O Orquestrador Central Cascata (Condomínio Inteligente)
  cascata-orchestrator:
    build:
      context: .
      dockerfile: ./deployments/Dockerfile.backend
    container_name: cascata-orchestrator
    environment:
      - PORT=8080
      - DB_URL=postgres://${DB_USER}:${DB_PASS}@cascata-db:5432/${DB_NAME}
      - DFLY_URL=redis://cascata-cache:6379
      - GO_ENV=${NODE_ENV}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - CASCATA_MASTER_KEY=${CASCATA_MASTER_KEY}
    # Porta 8080 agora é interna, acessível via Gateway na porta 80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cascata_extension_payloads:/cascata_extensions:ro
    depends_on:
      cascata-db:
        condition: service_healthy
    networks:
      - cascata-net

  # Banco de Dados de Metadados (Onde os nomes dos apartamentos/tenancy são guardados)
  cascata-db:
    image: postgres:18-alpine
    container_name: cascata-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - cascata-db-data:/var/lib/postgresql/data
      - ./scripts/phantom_linker.sh:/usr/local/bin/phantom_linker.sh:ro
      - ./scripts/init-meta.sql:/docker-entrypoint-initdb.d/init-meta.sql:ro
      - cascata_extension_payloads:/cascata_extensions
    command: >
      sh -c "
      (apk add --no-cache inotify-tools || true) &&
      (/usr/local/bin/phantom_linker.sh &) &&
      docker-entrypoint.sh postgres 
      -c shared_buffers=${PG_SHARED_BUFFERS:-128MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE:-256MB}
      -c work_mem=${PG_WORK_MEM:-4MB}
      -c maintenance_work_mem=64MB
      -c max_connections=100"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cascata-net

  # Dragonfly engine: Alta Performance Nativa (Multi-threaded) para Semáforos e Locks
  cascata-cache:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: cascata-cache
    ports:
      - "6379:6379"
    networks:
      - cascata-net

networks:
  cascata-net:
    driver: bridge

volumes:
  cascata-db-data:
  cascata_extension_payloads:
    name: cascata_extension_payloads
