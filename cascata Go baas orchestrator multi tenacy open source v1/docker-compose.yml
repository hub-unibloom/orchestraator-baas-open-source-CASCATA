services:
  # O Orquestrador Central Cascata (Condomínio Inteligente)
  cascata-orchestrator:
    build:
      context: .
      dockerfile: ./deployments/Dockerfile.backend
    container_name: cascata-orchestrator
    environment:
      - PORT=8080
      - DB_URL=postgres://${DB_USER}:${DB_PASS}@cascata-db:5432/${DB_NAME}
      - DFLY_URL=redis://cascata-cache:6379
      - GO_ENV=${NODE_ENV}
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cascata_extension_payloads:/cascata_extensions:ro
    depends_on:
      cascata-db:
        condition: service_healthy
    networks:
      - cascata-net

  # Banco de Dados de Metadados (Onde os nomes dos apartamentos/tenancy são guardados)
  cascata-db:
    image: postgres:18-alpine
    container_name: cascata-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - cascata-db-data:/var/lib/postgresql/data
      - ./scripts/phantom_linker.sh:/usr/local/bin/phantom_linker.sh:ro
      - ./scripts/init-meta.sql:/docker-entrypoint-initdb.d/init-meta.sql:ro
      - cascata_extension_payloads:/cascata_extensions
    command: >
      sh -c "
      (apk add --no-cache inotify-tools || true) &&
      (/usr/local/bin/phantom_linker.sh &) &&
      docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cascata_admin -d cascata_meta"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cascata-net

  # Dragonfly engine: Alta Performance Nativa (Multi-threaded) para Semáforos e Locks
  cascata-cache:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: cascata-cache
    ports:
      - "6379:6379"
    networks:
      - cascata-net

  # Vault - O Cofre Central de Segredos (HashiCorp Vault 1.15)
  cascata-vault:
    image: hashicorp/vault:1.15
    container_name: cascata-vault
    cap_add:
      - IPC_LOCK
    networks:
      - cascata-net
    command: server -config=/vault/config/cascata-vault.hcl
    volumes:
      - ./deployments/vault-config.hcl:/vault/config/cascata-vault.hcl:ro
      - cascata-vault-data:/vault/file
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  cascata-net:
    driver: bridge

volumes:
  cascata-db-data:
  cascata-vault-data:
  cascata_extension_payloads:
    name: cascata_extension_payloads
