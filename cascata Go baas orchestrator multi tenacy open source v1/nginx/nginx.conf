# ============================================================
# CASCATA v1.0.0.0 HARDENED PROXY (PHASE 22 - REVISED)
# Pure Vanilla Nginx. Zero Lua/OpenResty dependencies.
# The absolute first line of defense blocking malicious traffic
# before it allocates memory in the Go heap.
# ============================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 20480;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================================
    # 1. HEADER SCRUBBING & SECURE LOGGING
    # Never leak Authorization, Anon/Service Keys or Cookies.
    # ============================================================
    log_format cascata_secure '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'req_time=$request_time '
                              'scrubbed="[Hidden Keys]"';
    
    access_log /var/log/nginx/access.log cascata_secure;
    error_log  /var/log/nginx/error.log warn;

    # ============================================================
    # 2. AGGRESSIVE TIMEOUTS (Zombie & Slow Loris Protection)
    # ============================================================
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     65s;
    send_timeout          10s;

    # ============================================================
    # 3. RATE LIMITING (DDoS Protection Stage 1)
    # Applied extremely early in the C-Kernel space.
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=1500r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:20m;

    # ============================================================
    # 4. COMPRESSION (Performance Optimization)
    # ============================================================
    gzip on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ============================================================
    # 5. CACHING (Public Read Paths only)
    # ============================================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cascata_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # ============================================================
    # 6. ZERO-NETWORK HOT-PATH (Unix Domain Sockets)
    # Go native API processes listen on memory-mapped sockets.
    # Ignores standard Linux TCP/IP stack overhead.
    # ============================================================
    upstream cascata_go_cluster {
        server unix:/tmp/cascata_sockets/api_worker_1.sock max_fails=3 fail_timeout=5s;
        server unix:/tmp/cascata_sockets/api_worker_2.sock max_fails=3 fail_timeout=5s;
        server unix:/tmp/cascata_sockets/api_worker_3.sock max_fails=3 fail_timeout=5s;
        server backend_data:3000 backup; # TCP Fallback
    }

    server {
        # PORT 80 NEVER EXPOSED (Except for ACME Challenges)
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server http2;
        server_name _;

        # TLS Management
        ssl_certificate /etc/letsencrypt/live/system/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/system/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        server_tokens off;
        
        # Security Headers (Applied Globally)
        add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        # Fallback body size. Specific endpoints (like import) override this.
        client_max_body_size 10M;

        # Public Cacheable Endpoints
        location = /health {
            proxy_cache cascata_cache;
            proxy_cache_valid 200 10s;
            proxy_pass http://cascata_go_cluster;
        }

        location = /api/v1/openapi {
            proxy_cache cascata_cache;
            proxy_cache_valid 200 1m;
            proxy_pass http://cascata_go_cluster;
        }

        # Control Plane / Data Plane Wrapper
        location / {
            # Method Filtering (Native Nginx config, no Lua)
            limit_except GET POST PUT PATCH DELETE OPTIONS {
                deny all;
            }

            limit_req zone=api_limit burst=100 nodelay;
            limit_conn conn_limit 100;

            proxy_pass http://cascata_go_cluster;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Scrubbing credentials from going upstream into application logs accidentally
            proxy_hide_header Authorization;
            proxy_hide_header Cookie;
            proxy_hide_header X-Internal-Signature;

            # Ensure no caching whatsoever for tenant authenticated paths
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            
            # Streaming & Timeouts 
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 60s; # Default is aggressive. Long operations config overrides this.
        }
    }

    # Dynamic tenant inclusion (domains via Phase 20 dns-01 sidecars). 
    # Notice: Tenant specific files enforce 'return 444' for root directories.
    include /etc/nginx/conf.d/*.conf;
}
